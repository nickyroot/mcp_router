<svg width="680" height="530" viewBox="0 0 680 530" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
<title>MCP Router overview</title>
<desc>A user with work-1, work-2 and personal contexts talks to one MCP Router, which connects to multiple Notion and Slack accounts. Colored dots show which account each context selects. Panels below list the chat commands and terminal commands.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#57606a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="0.5" y="0.5" width="679" height="529" rx="8" fill="#ffffff" stroke="#d0d7de"/>

<rect x="40" y="90" width="150" height="150" rx="4" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="52" y="112" font-size="14" font-weight="500" fill="#1f2328">You + Claude</text>
<text x="52" y="130" font-size="12" fill="#57606a">any MCP client</text>
<rect x="52" y="142" width="126" height="24" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="115" y="154" font-size="12" fill="#3C3489" text-anchor="middle" dominant-baseline="central">work-1 context</text>
<rect x="52" y="174" width="126" height="24" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="115" y="186" font-size="12" fill="#712B13" text-anchor="middle" dominant-baseline="central">work-2 context</text>
<rect x="52" y="206" width="126" height="24" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="115" y="218" font-size="12" fill="#085041" text-anchor="middle" dominant-baseline="central">personal context</text>

<rect x="260" y="90" width="190" height="150" rx="4" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="272" y="112" font-size="14" font-weight="500" fill="#1f2328">MCP Router</text>
<text x="272" y="130" font-size="12" fill="#57606a">one MCP server</text>
<text x="272" y="158" font-size="12" fill="#57606a">merges duplicate tools</text>
<text x="272" y="178" font-size="12" fill="#57606a">injects account picker</text>
<text x="272" y="198" font-size="12" fill="#57606a">remembers your context</text>
<text x="272" y="218" font-size="12" fill="#57606a">hot reloads its config</text>

<line x1="190" y1="165" x2="250" y2="165" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="450" y1="150" x2="480" y2="122" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="450" y1="180" x2="480" y2="266" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="490" y="52" width="150" height="132" rx="4" fill="none" stroke="#d0d7de" stroke-dasharray="4 3"/>
<text x="502" y="70" font-size="14" font-weight="500" fill="#1f2328">Notion</text>
<rect x="502" y="82" width="126" height="24" rx="4" fill="#ffffff" stroke="#d0d7de"/>
<circle cx="514" cy="94" r="4" fill="#1D9E75"/>
<text x="524" y="94" font-size="12" fill="#57606a" dominant-baseline="central">personal</text>
<rect x="502" y="112" width="126" height="24" rx="4" fill="#ffffff" stroke="#d0d7de"/>
<circle cx="514" cy="124" r="4" fill="#7F77DD"/>
<text x="524" y="124" font-size="12" fill="#57606a" dominant-baseline="central">client-a</text>
<rect x="502" y="142" width="126" height="24" rx="4" fill="#ffffff" stroke="#d0d7de"/>
<circle cx="514" cy="154" r="4" fill="#D85A30"/>
<text x="524" y="154" font-size="12" fill="#57606a" dominant-baseline="central">client-b</text>

<rect x="490" y="204" width="150" height="132" rx="4" fill="none" stroke="#d0d7de" stroke-dasharray="4 3"/>
<text x="502" y="222" font-size="14" font-weight="500" fill="#1f2328">Slack</text>
<rect x="502" y="234" width="126" height="24" rx="4" fill="#ffffff" stroke="#d0d7de"/>
<circle cx="514" cy="246" r="4" fill="#1D9E75"/>
<text x="524" y="246" font-size="12" fill="#57606a" dominant-baseline="central">personal</text>
<rect x="502" y="264" width="126" height="24" rx="4" fill="#ffffff" stroke="#d0d7de"/>
<circle cx="514" cy="276" r="4" fill="#7F77DD"/>
<text x="524" y="276" font-size="12" fill="#57606a" dominant-baseline="central">work-1</text>
<rect x="502" y="294" width="126" height="24" rx="4" fill="#ffffff" stroke="#d0d7de"/>
<circle cx="514" cy="306" r="4" fill="#D85A30"/>
<text x="524" y="306" font-size="12" fill="#57606a" dominant-baseline="central">work-2</text>

<circle cx="46" cy="349" r="4" fill="#7F77DD"/>
<text x="56" y="349" font-size="12" fill="#57606a" dominant-baseline="central">work-1</text>
<circle cx="118" cy="349" r="4" fill="#D85A30"/>
<text x="128" y="349" font-size="12" fill="#57606a" dominant-baseline="central">work-2</text>
<circle cx="192" cy="349" r="4" fill="#1D9E75"/>
<text x="202" y="349" font-size="12" fill="#57606a" dominant-baseline="central">personal</text>
<text x="268" y="349" font-size="12" fill="#57606a" dominant-baseline="central">— each dot marks the account that context routes to</text>

<rect x="40" y="372" width="290" height="118" rx="4" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="52" y="392" font-size="14" font-weight="500" fill="#1f2328">say it in chat</text>
<text x="52" y="416" font-size="12" fill="#57606a">switch_context · switch_account</text>
<text x="52" y="436" font-size="12" fill="#57606a">current_context · current_account</text>
<text x="52" y="456" font-size="12" fill="#57606a">list_contexts · list_accounts</text>
<text x="52" y="476" font-size="12" fill="#57606a">or explicit: search(account="…")</text>

<rect x="350" y="372" width="290" height="118" rx="4" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="362" y="392" font-size="14" font-weight="500" fill="#1f2328">or from the terminal</text>
<text x="362" y="416" font-size="12" fill="#57606a">router init · validate · run</text>
<text x="362" y="436" font-size="12" fill="#57606a">router providers · contexts</text>
<text x="362" y="456" font-size="12" fill="#57606a">router stats · router secret set</text>
<text x="362" y="476" font-size="12" fill="#57606a">edit the config — it reloads live</text>
</svg>
